        fill="#1a1a1a">amevoca</text>

  <!-- Trademark symbol for amevoca (superscript, to the right) -->
  <text x="433" y="145"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="600"
