<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">

  <!-- Background (transparent for use on any surface) -->

  <!-- Frequency / prosody wave arcs — centered, sitting above wordmark -->
  <path d="M256 98 Q278 84 300 98 Q322 112 344 98" fill="none" stroke="#AFA9EC" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <path d="M236 98 Q268 76 300 98 Q332 120 364 98" fill="none" stroke="#AFA9EC" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <path d="M216 98 Q258 68 300 98 Q342 128 384 98" fill="none" stroke="#7F77DD" stroke-width="2"   stroke-linecap="round" opacity="0.7"/>
  <path d="M196 98 Q248 58 300 98 Q352 138 404 98" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="300" y="166"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="700"
